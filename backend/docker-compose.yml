version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: cybertron-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - cybertron-network

  # Gateway Service
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: cybertron-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
    env_file:
      - .envs/gateway.env
    depends_on:
      - auth-service
      - chat-service
      - payment-service
    networks:
      - cybertron-network
    volumes:
      - ./gateway:/app
      - /app/node_modules

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: cybertron-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - PORT=8001
    env_file:
      - .envs/auth.env
    depends_on:
      - mongodb
    networks:
      - cybertron-network
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules

  # Chat Service
  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: cybertron-chat
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - PORT=8002
    env_file:
      - .envs/chat.env
    depends_on:
      - mongodb
      - auth-service
    networks:
      - cybertron-network
    volumes:
      - ./services/chat-service:/app
      - /app/node_modules

  # Payment Service
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: cybertron-payment
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - PORT=8003
    env_file:
      - .envs/payment.env
    depends_on:
      - mongodb
      - auth-service
    networks:
      - cybertron-network
    volumes:
      - ./services/payment-service:/app
      - /app/node_modules

  # Redis (for caching and sessions)
  redis:
    image: redis:7-alpine
    container_name: cybertron-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cybertron-network

  # Nginx (reverse proxy for production)
  nginx:
    image: nginx:alpine
    container_name: cybertron-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - cybertron-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  cybertron-network:
    driver: bridge 